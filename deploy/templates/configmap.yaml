# Configuracion no sensible. Credenciales de RabbitMQ / Redis backplane vienen
# del Secret board-secrets sincronizado por el ExternalSecret (ver
# externalsecret.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: board-config
  namespace: patricia-app
data:
  BACKPLANE_ENABLED: {{ .Values.config.backplaneEnabled | quote }}
  BACKPLANE_CHANNEL: {{ .Values.config.backplaneChannel | quote }}

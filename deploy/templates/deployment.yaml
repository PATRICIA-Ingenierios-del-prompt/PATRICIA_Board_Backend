apiVersion: apps/v1
kind: Deployment
metadata:
  name: board
  namespace: patricia-app
  # patricia.io/sg-tier: socket (NO "standard"). Board esta en
  # var.socket_services (infra) y necesita ademas del SG eks_pods el SG
  # socket_ms_pods para alcanzar el backplane Redis (Cluster #2, Sec 4.1).
  # El SecurityGroupPolicy patricia-app-socket-pods (en Ulink_Infra/
  # security-group-policy.tf) ya asigna estos SGs a pods con esta label.
  labels: { app: board, patricia.io/sg-tier: socket }
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: board }
  template:
    metadata:
      labels: { app: board, patricia.io/sg-tier: socket }
    spec:
      serviceAccountName: board
      containers:
        - name: board
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef: { name: board-config }
            - secretRef:    { name: board-secrets }
          # spring-boot-starter-actuator ya esta en pom.xml (agregado con este
          # chart). Board no tiene spring-security, asi que /actuator/health no
          # necesita permitAll - no hay filter chain que lo bloquee.
          startupProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8086 }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

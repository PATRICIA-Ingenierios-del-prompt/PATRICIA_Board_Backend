# Trae lo que Board necesita desde AWS Secrets Manager a un Secret nativo de
# k8s (board-secrets) que el Deployment monta via envFrom.
#
# amazon-mq expone SPRING_RABBITMQ_ADDRESSES (URI amqps://...:5671 completa),
# y application.properties usa spring.rabbitmq.addresses -- coincide 1:1.
#
# backplane-redis (BACKPLANE_REDIS_HOST/PORT/PASSWORD) coincide con
# backplane.redis.* de application.properties.
#
# board/mongodb expone SPRING_DATA_MONGODB_URI (Atlas) -- estado compartido
# del tablero entre pods (BoardState en Mongo desde 2026-07-15).
#
# Board NO cablea cache-redis (no usa cache Redis).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: board-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: board-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: BACKPLANE_REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_HOST }
    - secretKey: BACKPLANE_REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PORT }
    - secretKey: BACKPLANE_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PASSWORD }
    - secretKey: SPRING_DATA_MONGODB_URI
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/board/mongodb", property: SPRING_DATA_MONGODB_URI }

# Nombre `board` (matches ECR/IRSA/secret naming en infra). Si el RouteConfig
# del Gateway espera otro hostname in-cluster para este MS, revisa que el
# Service in-cluster coincida. El endpoint WebSocket STOMP es /ws/board.
apiVersion: v1
kind: Service
metadata:
  name: board
  namespace: patricia-app
  labels: { app: board }
spec:
  type: ClusterIP
  selector: { app: board }
  ports:
    - port: 8086
      targetPort: 8086

server.port=8086
spring.application.name=board-backend

# --- AMQP (eventos de dominio: parche.created / parche.board.ready) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# --- Socket backplane (Redis Cluster #2, compartido por los MS de sockets) ---
# Apagado por defecto: un pod unico no lo necesita. En multi-pod,
# BACKPLANE_ENABLED=true y BACKPLANE_REDIS_* apuntando al cluster de pub/sub
# (distinto al Redis de cache si algun dia se agrega).
backplane.enabled=${BACKPLANE_ENABLED:false}
backplane.channel=${BACKPLANE_CHANNEL:patricia:backplane:board}
backplane.redis.host=${BACKPLANE_REDIS_HOST:localhost}
backplane.redis.port=${BACKPLANE_REDIS_PORT:6379}
backplane.redis.password=${BACKPLANE_REDIS_PASSWORD:}

server.port=8086
spring.application.name=board-backend

# --- AMQP (eventos de dominio: parche.created / parche.board.ready) ---
# Amazon MQ expone una URI amqps://...:5671 completa (TLS), no host+port
# separados -- por eso spring.rabbitmq.addresses, mismo patron que
# Parches/Location/Communication. En local, docker-compose sigue funcionando
# con el default amqp://guest:guest@localhost:5672.
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# --- Actuator (probes de K8s) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState

# --- Socket backplane (Redis Cluster #2, compartido por los MS de sockets) ---
# Apagado por defecto: un pod unico no lo necesita. En multi-pod,
# BACKPLANE_ENABLED=true y BACKPLANE_REDIS_* apuntando al cluster de pub/sub
# (distinto al Redis de cache si algun dia se agrega).
backplane.enabled=${BACKPLANE_ENABLED:false}
backplane.channel=${BACKPLANE_CHANNEL:patricia:backplane:board}
backplane.redis.host=${BACKPLANE_REDIS_HOST:localhost}
backplane.redis.port=${BACKPLANE_REDIS_PORT:6379}
backplane.redis.password=${BACKPLANE_REDIS_PASSWORD:}
